{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Documents</h2>
    </div>

    <!-- Upload Form -->
    <form action="/upload_document"
      method="POST"
      enctype="multipart/form-data">

    <input type="text"
           name="document_no"
           class="form-control mb-2"
           placeholder="Document Number"
           required>

    <input type="text"
           name="title"
           class="form-control mb-2"
           placeholder="Document Title"
           required>

    <select name="category_id"
            class="form-control mb-2"
            required>

        <option value="">Select Category</option>

        {% for category in categories %}
            <option value="{{ category.id }}">
                {{ category.category_name }}
            </option>
        {% endfor %}

    </select>

    <input type="file"
           name="file"
           class="form-control mb-2"
           required>

    <button type="submit"
            class="btn btn-success">
        Upload Document
    </button>

</form>

    <!-- Documents Table -->
    <div class="card">

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Document No</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>

                </thead>

                <tbody>

                {% for doc in documents %}

                    <tr>

                        <td>{{ doc.id }}</td>
                        <td>{{ doc.document_no }}</td>
                        <td>{{ doc.title }}</td>
                        <td>{{ doc.category_name }}</td>
                        <td>{{ doc.status }}</td>

                        <td>

                            <a href="/download/{{ doc.id }}"
                               class="btn btn-primary btn-sm">
                                Export
                            </a>

                        </td>

                    </tr>

                {% else %}

                    <tr>
                        <td colspan="6" class="text-center">
                            No documents found.
                        </td>
                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
