{% extends 'base.html' %}

{% block content %}

<h2>Users Management</h2>

<table class="table table-bordered">

    <thead>
        <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Username</th>
            <th>Role</th>
        </tr>
    </thead>

    <tbody>

    {% for user in users %}

        <tr>

            <td>{{ user.id }}</td>
            <td>{{ user.fullname }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.role }}</td>

        </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
