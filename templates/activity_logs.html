{% extends 'base.html' %}

{% block content %}

<h2>Activity Logs</h2>

<table class="table table-striped">

    <thead>

        <tr>
            <th>ID</th>
            <th>User</th>
            <th>Action</th>
            <th>Date</th>
        </tr>

    </thead>

    <tbody>

    {% for log in logs %}

        <tr>

            <td>{{ log.id }}</td>
            <td>{{ log.fullname }}</td>
            <td>{{ log.action }}</td>
            <td>{{ log.created_at }}</td>

        </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
